<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUHAMMAD MD NIZAM | Portfolio</title>
    <style>
        /* CRITICAL: This removes the GitHub white margins */
        body, html { 
            margin: 0 !important; 
            padding: 0 !important; 
            overflow-x: hidden;
            background-color: #000; /* Sets background to black immediately */
        }

        /* THE BLACK CINEMATIC LAYER */
        .hero-section {
            background: linear-gradient(180deg, #000000 0%, #1a1a1a 100%);
            width: 100vw;
            height: 100vh; /* Full screen height */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .hero-section h1 {
            font-family: 'Arial Black', sans-serif;
            font-weight: 900;
            font-size: clamp(2rem, 8vw, 4.5rem); /* Responsive size */
            letter-spacing: 15px;
            text-transform: uppercase;
            margin: 0;
        }

        .hero-section p {
            font-family: Arial, sans-serif;
            letter-spacing: 5px;
            opacity: 0.6;
            margin-top: 25px;
            text-transform: uppercase;
        }

        /* THE WHITE CONTENT LAYER */
        .white-layer {
            background-color: #ffffff;
            width: 100vw;
            padding: 100px 10%;
            color: #1a1a1a;
            box-sizing: border-box;
        }

        .section-header {
            font-family: 'Arial Black', sans-serif;
            text-align: center;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 50px;
        }
    </style>
</head>
<body>

    <div class="hero-section">
        <h1>MUHAMMAD MD NIZAM</h1>
        <p>Mechanical Engineering Portfolio</p>
        <div style="margin-top: 50px; font-size: 2rem; opacity: 0.3;">↓</div>
    </div>

    <div class="white-layer">
        <h2 class="section-header">About Me</h2>
        <p style="text-align: center; max-width: 800px; margin: 0 auto; line-height: 1.8; font-size: 1.1rem;">
            As a mechanical engineer with a passion for problem-solving and effective communication, I have gained experience in various industries and engineering fields.
        </p>
    </div>

</body>
</html>
