<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projectile Cannon Project</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
    <style>
        html, body {
            width: 100%;
            min-height: 100vh !important; 
            height: auto !important; 
            background-color: #081221 !important; 
            background-image: radial-gradient(circle at center, #1b3b6d 0%, #081221 100%) !important;
            background-attachment: fixed !important; 
            font-family: 'Inter', sans-serif;
            color: white;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }
        .hero-layer {
            text-align: center;
            padding: 80px 20px 40px;
        }
        .hero-layer h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(1.5rem, 4vw, 3rem);
            letter-spacing: 10px; 
            text-transform: uppercase;
            border: 3px solid #ffffff; 
            padding: 20px 20px 20px 30px !important; 
            display: inline-block; 
            margin-bottom: 15px !important;
        }
        .hero-layer p {
            font-size: 0.9rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 1;
            color: white;
            margin-top: 20px !important;
        }
        .floating-card-container {
            display: flex;
            justify-content: center;
            padding: 0 20px 60px;
        }
        .inner-frame {
            background-color: white;
            color: black;
            width: 100%;
            max-width: 900px;
            padding: 60px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .section-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }
        .about-text {
            font-size: 1rem;
            line-height: 1.8;
            color: #444;
        }
    </style>
</head>
<body>
    <section class="hero-layer">
        <h1>PROJECTILE CANNON</h1>
        <p>Design, Physics & Testing Phase</p>
    </section>

    <div class="floating-card-container">
        <div class="inner-frame">
            <h2 class="section-title">Project Overview</h2>
            <p class="about-text">
                Provide a high-level summary of the Projectile Cannon here. What were the target metrics? What materials were used, and how did it perform during testing?
            </p>
        </div>
    </div>
</body>
</html>
